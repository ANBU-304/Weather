# Application Name
spring.application.name=weather-api

# ===================================
# MySQL Database Configuration
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/weather?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA/Hibernate Configuration
# ===================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# File Upload
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===================================
# CSV Processing - CHANGE THIS PATH TO YOUR FILE
# ===================================
weather.csv.batch-size=1000
weather.csv.file-path=E:/Assessment 2/testset.csv

# ===================================
# Server Configuration
# ===================================
server.port=8087

# ===================================
# Logging
# ===================================
logging.level.org.springframework.web=INFO
logging.level.com.securin.weather=DEBUG